<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk — LuxeMode</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">LM</span>
      <div>
        <h1>LuxeMode</h1>
        <p>Fashion store front-end</p>
      </div>
    </div>

    <nav class="nav">
      <a href="index.html">Beranda</a>
      <a href="produk.html" class="active">Produk</a>
      <a href="keranjang.html">Keranjang</a>
      <a href="komentar.html">Komentar</a>
    </nav>

    <button class="cart-pill" type="button">
      🛍️ <span id="cartCount">0</span>
    </button>
  </header>

  <main>
    <section class="page-header">
      <h1>Koleksi Produk</h1>
      <p>Jelajahi semua koleksi fashion premium kami</p>
    </section>

    <section class="section">
      <div class="filter-bar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Cari produk..."
        />
        <select id="filterCategory" class="filter-select">
          <option value="">Semua Kategori</option>
          <option value="men">Pria</option>
          <option value="women">Wanita</option>
          <option value="accessories">Aksesori</option>
        </select>
      </div>

      <div class="product-grid" id="productGrid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 LuxeMode. Front-end fashion e-commerce.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
